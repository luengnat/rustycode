# cargo-deny configuration
# See: https://github.com/EmbarkStudios/cargo-deny
#
# This file configures cargo-deny for license compliance, dependency policies,
# and security advisory checks.

[licenses]
# List of explicitly allowed licenses
# See: https://spdx.org/licenses/ for list of valid license identifiers
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "Unlicense",
    "Unicode-3.0",
    "BSL-1.0",          # Boost Software License - used by clipboard-win
    "NCSA",             # University of Illinois/NCSA License - used by libfuzzer-sys
    "GPL-3.0-or-later", # Used by html2md
    "GPL-2.0-only",     # Used by iterm2-client
    "CDLA-Permissive-2.0", # Used by webpki-roots
]

# Confidence threshold for license detection (0.0 to 1.0)
confidence-threshold = 0.8

# Build metadata for specific crates
[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[[licenses.clarify]]
name = "rustls"
version = "*"
expression = "Apache-2.0 OR ISC"
license-files = [
    { path = "LICENSE-APACHE", hash = 0x001c5c03 },
    { path = "LICENSE-ISC", hash = 0x001c5c03 },
]

[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"

# Highlight which crates depend on duplicate versions
highlight = "all"

[advisories]
# Advisory database configuration
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]

# Ignore known unmaintained crates that we can't easily replace
# These are tracked but don't fail CI
[[advisories.ignore]]
id = "RUSTSEC-2024-0320"  # yaml-rust unmaintained
reason = "Used by syntect for syntax highlighting. No easy replacement available."

[[advisories.ignore]]
id = "RUSTSEC-2025-0141"  # bincode unmaintained
reason = "Used by syntect. Consider migrating to bincode 2 when stable."

[[advisories.ignore]]
id = "RUSTSEC-2025-0119"  # number_prefix unmaintained
reason = "Transitive dependency via indicatif. Low impact."

[[advisories.ignore]]
id = "RUSTSEC-2024-0436"  # paste unmaintained
reason = "Transitive dependency via tokenizers/rav1e. Macro utility."

[[advisories.ignore]]
id = "RUSTSEC-2025-0134"  # rustls-pemfile unmaintained
reason = "Transitive dependency. Functionality absorbed by rustls."

[[advisories.ignore]]
id = "RUSTSEC-2026-0008"  # git2 Buf deref UB
reason = "Potential UB in rare cases. Low impact for our use case."

[[advisories.ignore]]
id = "RUSTSEC-2026-0002"  # lru IterMut Stacked Borrows
reason = "Low impact - affects dev dependency usage only."

[[advisories.ignore]]
id = "RUSTSEC-2024-0375"  # atty unmaintained
reason = "Dev dependency via criterion. Low impact. Use std::io::IsTerminal when convenient."

[[advisories.ignore]]
id = "RUSTSEC-2026-0097"  # rand unsound with custom logger
reason = "Requires custom logger + rand::rng(). Low impact for our use case."

[[advisories.ignore]]
id = "RUSTSEC-2026-0049"  # rustls-webpki CRL issue
reason = "Limited impact - requires compromised CA. Low priority."

[[advisories.ignore]]
id = "RUSTSEC-2026-0098"  # rustls-webpki URI name constraints
reason = "Transitive dep from reqwest 0.11 -> rustls 0.21. Upgrade planned for later."

[[advisories.ignore]]
id = "RUSTSEC-2026-0099"  # rustls-webpki wildcard name constraints
reason = "Transitive dep from reqwest 0.11 -> rustls 0.21. Upgrade planned for later."

[sources]
# Allow sources configuration
unknown-registry = "warn"
unknown-git = "warn"

# Allowed registries (crates.io is always allowed)
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]

[sources.allow-org]
# Allow specific GitHub organizations
github = []
