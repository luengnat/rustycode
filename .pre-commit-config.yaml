repos:
  - repo: local
    hooks:
      - id: fmt
        name: rust fmt
        entry: cargo fmt --
        language: system
        pass_filenames: false
        always_run: true

      - id: fmt-check
        name: rust fmt --check
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        always_run: true

      - id: clippy
        name: rust clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        pass_filenames: false
        always_run: true

      - id: test
        name: rust test
        entry: cargo test --quiet
        language: system
        pass_filenames: false
        always_run: true

      - id: doc
        name: rust doc
        entry: cargo doc --no-deps --quiet
        language: system
        pass_filenames: false
        always_run: true
