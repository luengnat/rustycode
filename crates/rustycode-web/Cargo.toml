[package]
name = "rustycode-web"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
console_log = "0.2"
log = "0.4"
ratzilla = "0.3.0"
rustycode-ui-core = { path = "../rustycode-ui-core" }
gloo-net = "0.6"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
itertools = { version = "0.13", default-features = false }
rustycode-protocol = { path = "../rustycode-protocol" }
getrandom = { version = "0.2", features = ["js"] }
web-sys = "0.3"
